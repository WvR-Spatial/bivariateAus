<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Australia Bivariate Climate Map</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; display: flex; justify-content: center; padding: 20px; margin: 0; }
        #visualization-wrapper { position: relative; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 1000px; width: 100%; }
        #map-container { width: 100%; overflow: hidden; position: relative; }
        
        /* The Legend: Positioned and rotated via CSS for better control */
        #legend-container {
            position: absolute;
            bottom: 40px;
            right: 40px;
            transform: rotate(-45deg);
            background: rgba(255, 255, 255, 0.8);
            padding: 10px;
            pointer-events: none; /* Allows clicks to pass through to the map if needed */
        }
        /* Counter-rotate labels so they are horizontal and legible */
        .legend-label {
            font-size: 11px;
            font-weight: bold;
            fill: #333;
            transform-box: fill-box;
            transform-origin: center;
        }
    </style>
</head>
<body>

    <div id="visualization-wrapper">
        <div id="map-container">
            <div id="legend-container"></div>
        </div>
    </div>

    <script type="module">
        import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7.8.5/+esm";
        import * as Plot from "https://cdn.jsdelivr.net/npm/@observablehq/plot@0.6.13/+esm";
        import * as topojson from "https://cdn.jsdelivr.net/npm/topojson-client@3.1.0/+esm";

        async function initMap() {
            try {
                const [climateData, world] = await Promise.all([
                    fetch("./climate_data.json").then(r => r.json()),
                    fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-10m.json").then(r => r.json())
                ]);

                // 1. Clean up Geometry
                // Merge all features named 'Australia' into one single MultiPolygon geometry
                const australiaGeom = topojson.merge(world, world.objects.countries.geometries.filter(d => 
                    d.properties?.name === "Australia" || d.id === "036"
                ));

                if (!australiaGeom) throw new Error("Could not find Australia in geometry data.");

                const lon = Float32Array.from(climateData, d => d.lon);
                const lat = Float32Array.from(climateData, d => d.lat);
                const ppt = Float32Array.from(climateData, d => d.ppt);
                const temp = Float32Array.from(climateData, d => d.temp);

                const n = 5;
                const oranges = d3.schemeOranges[n + 1].slice(0, -1);
                const blues = d3.schemeBlues[n + 1].slice(0, -1);

                function mixblend([a, b]) {
                    a = d3.rgb(a); b = d3.rgb(b);
                    const l = Math.min(250, b.r + b.g + b.b);
                    a.r *= b.r / l; a.g *= b.g / l; a.b *= b.b / l;
                    return a.hex();
                }

                const color = {
                    domain: d3.range(n * n),
                    range: d3.cross(blues, oranges).map(mixblend)
                };

                // 2. Render the Legend
                const legend = Plot.plot({
                    width: 140,
                    height: 140,
                    axis: null,
                    margin: 0,
                    style: { background: "none" },
                    marks: [
                        Plot.cell(d3.cross(d3.range(n), d3.range(n)), {
                            x: ([a]) => a,
                            y: ([, b]) => b,
                            fill: ([a, b]) => n * a + b,
                            inset: 0.5
                        }),
                        Plot.text(["Precipitation →"], {
                            frameAnchor: "bottom",
                            dy: 25,
                            rotate: 45, // Counter-rotate relative to the parent -45deg
                            fontSize: 10,
                            fontWeight: "bold"
                        }),
                        Plot.text(["Temp →"], {
                            frameAnchor: "left",
                            dx: -25,
                            rotate: 45,
                            fontSize: 10,
                            fontWeight: "bold"
                        })
                    ]
                });
                document.getElementById("legend-container").appendChild(legend);

                // 3. Setup Bivariate Interpolator
                function interpolateBivariate(n, v1, v2) {
                    const r = d3.range(n);
                    const s1 = d3.scaleQuantile(v1, r);
                    const s2 = d3.scaleQuantile(v2, r);
                    const interpolate = Plot.interpolatorBarycentric();
                    return function(I, w, h, X, Y) {
                        const V1 = interpolate(I, w, h, X, Y, v1);
                        const V2 = interpolate(I, w, h, X, Y, v2);
                        return Uint8Array.from(V1, (_, i) => n * s1(V1[i]) + s2(V2[i]));
                    }
                }

                // 4. Render the Main Map
                const map = Plot.plot({
                    projection: { 
                        type: "albers", 
                        domain: australiaGeom, // Use merged geometry for domain
                        parallels: [-18, -36], 
                        rotate: [-132, 0] 
                    },
                    color, 
                    width: 900, 
                    height: 700,
                    marks: [
                        Plot.raster({length: ppt.length}, {
                            x: lon, 
                            y: lat, 
                            fill: 0,
                            interpolate: interpolateBivariate(n, ppt, temp),
                            clip: australiaGeom // FIX: Use the merged geometry object here
                        }),
                        Plot.geo(australiaGeom, {strokeWidth: 0.7, stroke: "#444"})
                    ]
                });
                
                document.getElementById("map-container").appendChild(map);

            } catch (error) {
                console.error("Map Error:", error);
                document.getElementById("map-container").innerHTML = `<div style="padding: 20px; color: red;">${error}</div>`;
            }
        }

        initMap();
    </script>
</body>
</html>
