<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Australia Bivariate Climate Map</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; display: flex; justify-content: center; padding: 20px; margin: 0; }
        #visualization-wrapper { position: relative; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 1000px; width: 100%; }
        #map-container { width: 100%; overflow: hidden; }
        /* Cleaned up CSS: separate legend container styling removed */
    </style>
</head>
<body>

    <div id="visualization-wrapper">
        <div id="map-container"></div>
    </div>

    <script type="module">
        import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7.8.5/+esm";
        import * as Plot from "https://cdn.jsdelivr.net/npm/@observablehq/plot@0.6.13/+esm";
        import * as topojson from "https://cdn.jsdelivr.net/npm/topojson-client@3.1.0/+esm";

        async function initMap() {
            try {
                // Fetch the lightweight JSON and the map geometry
                const [climateData, world] = await Promise.all([
                    fetch("./climate_data.json").then(r => r.json()),
                    fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-10m.json").then(r => r.json())
                ]);

                // Map the JSON array into typed arrays for fast plotting
                const lon = Float32Array.from(climateData, d => d.lon);
                const lat = Float32Array.from(climateData, d => d.lat);
                const ppt = Float32Array.from(climateData, d => d.ppt);
                const temp = Float32Array.from(climateData, d => d.temp);

                const land = topojson.feature(world, world.objects.countries);
                const australia = {
                    type: "FeatureCollection",
                    features: land.features.filter(d => d.properties.name === "Australia")
                };

                const n = 5;
                const oranges = d3.schemeOranges[n + 1].slice(0, -1);
                const blues = d3.schemeBlues[n + 1].slice(0, -1);

                function mixblend([a, b]) {
                    a = d3.rgb(a); b = d3.rgb(b);
                    const l = Math.min(250, b.r + b.g + b.b);
                    a.r *= b.r / l; a.g *= b.g / l; a.b *= b.b / l;
                    return a.hex();
                }

                const color = {
                    domain: d3.range(n * n),
                    range: d3.cross(blues, oranges).map(mixblend)
                };

                // Define Legend Function to create the inner plot
                const createLegendPlot = () =>
                  Plot.plot({
                    color,
                    axis: null,
                    margin: 0,
                    inset: 18,
                    width: 136,
                    height: 136,
                    y: {reverse: true},
                    marks: [
                      Plot.cell(d3.cross(d3.range(n), d3.range(n)), {
                        x: ([a, b]) => a,
                        y: ([a, b]) => b,
                        fill: ([a, b]) => n * a + b,
                        inset: -1,
                      }),
                      // Text marks defined using standard Plot logic, not CSS
                      Plot.text(["Precipitation →"], {
                        frameAnchor: "bottom-right",
                        fontWeight: "bold",
                        dx: -18,
                        dy: -6,
                      }),
                      Plot.text(["← Temperature"], {
                        frameAnchor: "top-left",
                        fontWeight: "bold",
                        rotate: 90, // Positioned for rotation
                        dx: 12,
                        dy: 18
                      })
                    ]
                  });

                // Interpolator function
                function interpolateBivariate(n, v1, v2) {
                    const r = d3.range(n);
                    const s1 = d3.scaleQuantile(v1, r);
                    const s2 = d3.scaleQuantile(v2, r);
                    const interpolate = Plot.interpolatorBarycentric();
                    
                    return function(I, w, h, X, Y) {
                        const V1 = interpolate(I, w, h, X, Y, v1);
                        const V2 = interpolate(I, w, h, X, Y, v2);
                        return Uint8Array.from(V1, (_, i) => n * s1(V1[i]) + s2(V2[i]));
                    }
                }

                // Main Map Definition
                const map = Plot.plot({
                    projection: { type: "albers", domain: australia, parallels: [-18, -36], rotate: [-132, 0] },
                    color, width: 900, height: 700,
                    marks: [
                        // Fix 1: Add clip: australia back
                        Plot.raster({length: ppt.length}, {
                            x: lon, y: lat, fill: 0,
                            interpolate: interpolateBivariate(n, ppt, temp),
                            clip: australia // constrain to landmass
                        }),
                        
                        // Fix 2: Embed and Rotate Legend
                        // We use a custom mark function to add the legend SVG group inside the map's frame,
                        // positioned in the bottom-right and rotated -45 degrees, as preferred in the UK example.
                        (index, scale, {width, height}) => {
                            const legendPlot = createLegendPlot();
                            const g = d3.create("svg:g");
                            // Position bottom-right of map canvas frame
                            g.attr("style", `transform: translate(${width - 250}px, ${height - 250}px) rotate(-45deg);`);
                            g.node().appendChild(legendPlot);
                            return g.node();
                        },
                        
                        Plot.geo(australia, {strokeWidth: 0.5, stroke: "#333"})
                    ]
                });
                
                document.getElementById("map-container").appendChild(map);

            } catch (error) {
                console.error("Map Error:", error);
            }
        }

        initMap();
    </script>
</body>
</html>
