<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Australia Bivariate Climate Map</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #1f2a30; /* gunmetal */
}

#wrapper {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
    background: #2b3a40;
    border-radius: 12px;
}

#map-container {
    position: relative;
}

#legend {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(30,40,45,0.9);
    padding: 12px;
    border-radius: 6px;
}

#controls {
    margin-top: 10px;
    color: white;
}
</style>
</head>

<body>
<div id="wrapper">
    <div id="map-container">
        <div id="legend"></div>
    </div>

    <div id="controls">
        <input type="range" id="slider" min="0" max="0" value="0" disabled>
        <span id="yearLabel">Static dataset</span>
    </div>
</div>

<script type="module">
import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";
import * as Plot from "https://cdn.jsdelivr.net/npm/@observablehq/plot@0.6/+esm";
import * as topojson from "https://cdn.jsdelivr.net/npm/topojson-client@3/+esm";

const n = 5; // clarity over complexity

const data = await fetch("./climate_data.json").then(r => r.json());
const world = await fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-10m.json").then(r => r.json());

const australia = topojson.merge(
  world,
  world.objects.countries.geometries.filter(d =>
    d.properties?.name === "Australia" || d.id === "036"
  )
);

// --- DATA ARRAYS ---
const lon = Float32Array.from(data, d => d.lon);
const lat = Float32Array.from(data, d => d.lat);
const temp = Float32Array.from(data, d => d.temp);
const ppt = Float32Array.from(data, d => d.ppt);

// --- QUANTILE SCALES (SHARED) ---
const sTemp = d3.scaleQuantile(temp, d3.range(n));
const sPpt = d3.scaleQuantile(ppt, d3.range(n));

// --- COLOUR AXES ---
const tempColor = d3.scaleLinear()
    .domain([d3.min(temp), d3.max(temp)])
    .range(["#2c7bb6", "#d7191c"]); // blue → red

const pptColor = d3.scaleLinear()
    .domain([d3.min(ppt), d3.max(ppt)])
    .range(["#d8b365", "#1a9850"]); // tan → green

// --- BLENDING FUNCTION ---
function blend(c1, c2) {
    c1 = d3.lab(c1);
    c2 = d3.lab(c2);
    return d3.lab(
        (c1.l + c2.l) / 2,
        (c1.a + c2.a) / 2,
        (c1.b + c2.b) / 2
    ).formatHex();
}

// --- BUILD COLOR MATRIX ---
const colorMatrix = d3.cross(d3.range(n), d3.range(n)).map(([i, j]) => {
    const t = d3.quantile(temp, (i + 0.5) / n);
    const p = d3.quantile(ppt, (j + 0.5) / n);
    return blend(tempColor(t), pptColor(p));
});

const colorScale = {
    domain: d3.range(n * n),
    range: colorMatrix
};

// --- INTERPOLATOR ---
function interpolateBivariate(n, v1, v2) {
    const interpolate = Plot.interpolatorBarycentric();

    return function(I, w, h, X, Y) {
        const V1 = interpolate(I, w, h, X, Y, v1);
        const V2 = interpolate(I, w, h, X, Y, v2);

        return Uint8Array.from(V1, (_, i) =>
            sTemp(V1[i]) + sPpt(V2[i]) * n
        );
    }
}

// --- LEGEND ---
function buildLegend() {
    return Plot.plot({
        width: 180,
        height: 180,
        axis: null,
        margin: 10,
        marks: [
            Plot.cell(d3.cross(d3.range(n), d3.range(n)), {
                x: ([i]) => i,
                y: ([, j]) => j,
                fill: ([i, j]) => i + j * n
            }),
            Plot.text(["Hotter →"], {
                frameAnchor: "bottom",
                dy: 20,
                fontWeight: "bold"
            }),
            Plot.text(["Wetter →"], {
                frameAnchor: "left",
                dx: -20,
                rotate: -90,
                fontWeight: "bold"
            }),
            Plot.text(["Cold"], {x: 0, y: n-1, dy: 15}),
            Plot.text(["Hot"], {x: n-1, y: n-1, dy: 15}),
            Plot.text(["Dry"], {x: 0, y: 0, dy: -10}),
            Plot.text(["Wet"], {x: n-1, y: 0, dy: -10})
        ]
    });
}

// --- MAP RENDER ---
function renderMap() {
    const map = Plot.plot({
        projection: {
            type: "albers",
            domain: australia,
            parallels: [-18, -36],
            rotate: [-132, 0]
        },
        width: 1000,
        height: 750,
        color: colorScale,
        marks: [
            Plot.raster({length: temp.length}, {
                x: lon,
                y: lat,
                fill: 0,
                interpolate: interpolateBivariate(n, temp, ppt),
                clip: australia
            }),
            Plot.geo(australia, {stroke: "#aaa"})
        ]
    });

    document.getElementById("map-container").appendChild(map);
}

// --- INIT ---
document.getElementById("legend").appendChild(buildLegend());
renderMap();

</script>
</body>
</html>
